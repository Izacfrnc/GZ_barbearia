<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body{
      font-family: Arial;
      background: #111;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:#222;
      padding:30px;
      border-radius:10px;
      width:300px;
    }

    h2{
      color:white;
      text-align:center;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:5px;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:15px;
      border:none;
      border-radius:5px;
      background:red;
      color:white;
      cursor:pointer;
    }

    p{
      color:white;
      text-align:center;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <p id="mensagem"></p>
</div>

<script>
async function login(){

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const resposta = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            email,
            senha
        })
    });

    const dados = await resposta.json();

    if(resposta.ok){

        localStorage.setItem("tipo", dados.tipo);
        localStorage.setItem("nome", dados.nome);

        if(dados.tipo === "adm"){
            window.location.href = "admin.html";
        } else {
            window.location.href = "cliente.html";
        }

    } else {
        document.getElementById("mensagem").innerText = dados.erro;
    }
}
</script>

</body>
</html>
